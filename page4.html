<!DOCTYPE html>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #220033, #ff4de1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 20px;
        }

        .page-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .container {
            width: 500px;
            max-width: 100%;
            background-color: #000000;
            padding: 30px 20px;
            border-radius: 10px;
            border: 3px solid #333;
            font-style: italic;
            font-weight: bold;
            text-align: center;
            color: #fff;
        }

        .container h1 {
            color: #ff4de1;
            text-shadow: 0 0 12px #ff4de1;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .container p {
            color: #ffd6ff;
            text-shadow: 0 0 8px #ff99f2;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .page-label {
            color: #ff4de1;
            text-shadow: 0 0 8px #ff4de1;
            font-size: 0.9rem;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #220033, #ff4de1);
            border: 2px solid #ff4de1;
            border-radius: 50%;
            color: #ff4de1;
            font-size: 28px;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }

        .nav-arrow:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 77, 225, 0.6);
        }

        .play-button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #220033, #ff4de1);
            color: #ff4de1;
            font-weight: bold;
            font-size: 20px;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid #ff4de1;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 16px rgba(255, 77, 225, 0.5);
        }
