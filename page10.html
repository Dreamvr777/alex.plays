<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>m3gtse92 - Page 10</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(160deg, #001a0d, #00ff6a);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .scroll-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .message-card {
            width: 540px;
            max-width: 100%;
            background: #000;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 38px 28px;
            text-align: center;
            font-style: italic;
            font-weight: bold;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.75s ease, transform 0.75s ease;
        }

        .message-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-label {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ff6a;
            text-shadow: 0 0 8px #00ff6a;
            margin-bottom: 18px;
        }

        .message-card h1 {
            font-size: 2rem;
            color: #00ff6a;
            text-shadow: 0 0 16px #00ff6a;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .message-card p {
            font-size: 1.05rem;
            color: #b3ffdb;
            text-shadow: 0 0 8px #00ff6a44;
            line-height: 1.7;
        }

        .scroll-hint {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #00ff6a;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: bounce 1.2s ease-in-out infinite;
        }

        .scroll-hint .arrow { font-size: 1.8rem; line-height: 1; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(8px); }
        }

        /* ── Game card ── */
        .game-card { width: 600px; }

        #gameCanvas {
            width: 100%;
            height: auto;
            display: block;
            margin-top: 18px;
            border-radius: 8px;
            border: 2px solid #00ff6a55;
            cursor: pointer;
            touch-action: none;   /* kills 300ms tap delay */
            -webkit-tap-highlight-color: transparent;
            image-rendering: crisp-edges;
        }

        .back-arrow {
            position: fixed;
            bottom: 28px;
            left: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #001a0d, #00ff6a);
            border: 2px solid #00ff6a;
            border-radius: 50%;
            color: #00ff6a;
            font-size: 28px;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            z-index: 999;
        }

        .back-arrow:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,255,106,0.6);
        }
    </style>
</head>
<body>

    <!-- ── Section 1 ── -->
    <div class="scroll-section">
        <div class="message-card" data-reveal>
            <p class="page-label">Page 10</p>
            <h1>ok ok ok...</h1>
            <p>u thought it was over huh 💀</p>
            <div class="scroll-hint">
                <span>keep scrolling</span>
                <span class="arrow">↓</span>
            </div>
        </div>
    </div>

    <!-- ── Section 2 ── -->
    <div class="scroll-section">
        <div class="message-card" data-reveal>
            <h1>now i know i said<br>there was no more games...</h1>
            <div class="scroll-hint"><span class="arrow">↓</span></div>
        </div>
    </div>

    <!-- ── Section 3 ── -->
    <div class="scroll-section">
        <div class="message-card" data-reveal>
            <h1>but i have to<br>entertain u 😭</h1>
            <p>like what else am i supposed to do</p>
            <div class="scroll-hint"><span class="arrow">↓</span></div>
        </div>
    </div>

    <!-- ── Section 4 : THE GAME ── -->
    <div class="scroll-section">
        <div class="message-card game-card" data-reveal>
            <h1>so check out ts game 🎮</h1>
            <p>tap / click / space to jump &nbsp;—&nbsp; don't die 💀</p>
            <!-- internal 560×180, CSS scales it to fill the card -->
            <canvas id="gameCanvas" width="560" height="180"></canvas>
        </div>
    </div>

    <a href="page9.html" class="back-arrow" title="Previous Page">&#8249;</a>

    <script>
    /* ═══════════════════════════════════════════════
       SCROLL REVEAL
    ═══════════════════════════════════════════════ */
    const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.25 });
    document.querySelectorAll('[data-reveal]').forEach(el => revealObserver.observe(el));

    /* ═══════════════════════════════════════════════
       GEOMETRY DASH — CLONE
    ═══════════════════════════════════════════════ */
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');

    // Fixed internal resolution
    const W  = 560;
    const H  = 180;
    const GY = 142;   // ground y (top of ground strip)
    const PS = 34;    // player size
    const G  = 0.68;  // gravity per frame
    const JV = -11.2; // jump velocity

    const NEON   = '#00ff6a';
    const NEON_D = '#005530';
    const NEON_M = '#00cc55';

    let player, obstacles, particles, score, speed, running, rafId, bgX, nextObsDist;

    /* ── Init / restart ── */
    function startGame() {
        player = { x: 100, y: GY - PS, vy: 0, onGround: true, rot: 0 };
        obstacles  = [];
        particles  = [];
        score      = 0;
        speed      = 5;
        bgX        = 0;
        running    = true;
        nextObsDist = 380;
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
    }

    /* ── Jump (with no-delay input) ── */
    function doJump() {
        if (!running) { startGame(); return; }
        if (player.onGround) {
            player.vy = JV;
            player.onGround = false;
            // dust particles at feet
            for (let i = 0; i < 7; i++) addParticle(
                player.x + PS / 2, GY,
                (Math.random() - 0.5) * 3.5, Math.random() * -2 - 0.5,
                Math.random() * 3 + 1
            );
        }
    }

    // mousedown — no delay
    canvas.addEventListener('mousedown', e => { e.preventDefault(); doJump(); });
    // touchstart — no 300ms delay (passive:false + preventDefault)
    canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, { passive: false });
    // keyboard
    document.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
    });

    /* ── Particles ── */
    function addParticle(x, y, vx, vy, size) {
        particles.push({ x, y, vx, vy, life: 1, size });
    }

    /* ── Obstacle spawner ── */
    const OBS_TYPES = ['spike', 'spike', 'spike', 'dspike', 'block', 'tall'];

    function spawnObs() {
        const t = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
        obstacles.push({ x: W + 20, type: t });
    }

    /* ── Hitboxes ── */
    function getHitboxes(o) {
        switch (o.type) {
            case 'spike':  return [{ x: o.x + 3, y: GY - 34, w: 22, h: 34 }];
            case 'dspike': return [
                { x: o.x + 3,  y: GY - 34, w: 22, h: 34 },
                { x: o.x + 31, y: GY - 34, w: 22, h: 34 }
            ];
            case 'block':  return [{ x: o.x,     y: GY - 44, w: 40, h: 44 }];
            case 'tall':   return [{ x: o.x,     y: GY - 60, w: 40, h: 60 }];
        }
        return [];
    }

    function playerHit() {
        const px = player.x + 6, py = player.y + 6, pw = PS - 12, ph = PS - 12;
        for (const o of obstacles) {
            for (const hb of getHitboxes(o)) {
                if (px < hb.x + hb.w && px + pw > hb.x &&
                    py < hb.y + hb.h && py + ph > hb.y) return true;
            }
        }
        return false;
    }

    /* ── Die ── */
    function die() {
        running = false;
        for (let i = 0; i < 18; i++) addParticle(
            player.x + PS / 2, player.y + PS / 2,
            (Math.random() - 0.5) * 9, Math.random() * -7 - 1,
            Math.random() * 5 + 2
        );
        (function deathFrame() {
            ctx.clearRect(0, 0, W, H);
            drawBg();
            updateAndDrawParticles();
            drawGround();
            // overlay text
            ctx.textAlign = 'center';
            ctx.font = 'bold italic 21px system-ui';
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 18;
            ctx.fillText('💀  tap to restart', W / 2, H / 2 - 4);
            ctx.font = 'italic 13px system-ui';
            ctx.fillStyle = '#ffaaaa';
            ctx.shadowBlur = 0;
            ctx.fillText('score: ' + Math.floor(score), W / 2, H / 2 + 16);
            if (particles.length > 0) requestAnimationFrame(deathFrame);
        })();
    }

    /* ══════════════ MAIN LOOP ══════════════ */
    function tick() {
        // Speed up
        speed += 0.003;
        score += speed * 0.04;
        bgX  -= speed * 0.5;

        // ── Player physics ──
        player.vy += G;
        player.y  += player.vy;
        if (player.y >= GY - PS) {
            player.y       = GY - PS;
            player.vy      = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        // Cube rotation
        if (!player.onGround) {
            player.rot += 0.10;
        } else {
            const snap = Math.round(player.rot / (Math.PI / 2)) * (Math.PI / 2);
            player.rot += (snap - player.rot) * 0.3;
        }

        // ── Obstacles ──
        nextObsDist -= speed;
        if (nextObsDist <= 0) {
            spawnObs();
            nextObsDist = 270 + Math.random() * 280;
        }
        for (const o of obstacles) o.x -= speed;
        obstacles = obstacles.filter(o => o.x > -80);

        // ── Particles ──
        for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.18;
            p.life -= 0.04;
        }
        particles = particles.filter(p => p.life > 0);

        // ── Collision ──
        if (playerHit()) { die(); return; }

        // ── Draw ──
        drawGame();
        rafId = requestAnimationFrame(tick);
    }

    /* ═══════════════ DRAWING ═══════════════ */
    function drawBg() {
        ctx.fillStyle = '#040e08';
        ctx.fillRect(0, 0, W, H);

        // moving grid
        ctx.strokeStyle = '#0b2218';
        ctx.lineWidth = 1;
        const g  = 36;
        const ox = ((bgX % g) + g) % g;
        for (let x = ox; x < W; x += g) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GY); ctx.stroke();
        }
        for (let y = 0; y < GY; y += g) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
    }

    function drawGround() {
        // fill below ground
        ctx.fillStyle = '#001208';
        ctx.fillRect(0, GY, W, H - GY);

        // glowing ground line
        ctx.strokeStyle = NEON;
        ctx.shadowColor  = NEON;
        ctx.shadowBlur   = 7;
        ctx.lineWidth    = 2;
        ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(W, GY); ctx.stroke();
        ctx.shadowBlur = 0;

        // tile dividers
        ctx.strokeStyle = '#003318';
        ctx.lineWidth   = 1;
        const g  = 36;
        const ox = ((bgX % g) + g) % g;
        for (let x = ox; x < W; x += g) {
            ctx.beginPath(); ctx.moveTo(x, GY); ctx.lineTo(x, H); ctx.stroke();
        }
    }

    function drawSpike(x, w, h) {
        ctx.beginPath();
        ctx.moveTo(x,          GY);
        ctx.lineTo(x + w / 2,  GY - h);
        ctx.lineTo(x + w,      GY);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    function drawObstacles() {
        ctx.fillStyle   = NEON;
        ctx.strokeStyle = NEON_M;
        ctx.lineWidth   = 1.5;
        ctx.shadowColor = NEON;
        ctx.shadowBlur  = 9;

        for (const o of obstacles) {
            switch (o.type) {
                case 'spike':
                    drawSpike(o.x, 28, 34);
                    break;
                case 'dspike':
                    drawSpike(o.x,      28, 34);
                    drawSpike(o.x + 30, 28, 34);
                    break;
                case 'block': {
                    const bx = o.x, by = GY - 44, bw = 40, bh = 44;
                    ctx.fillStyle = NEON_D;
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.fillStyle   = NEON;
                    ctx.strokeStyle = NEON;
                    ctx.lineWidth   = 2;
                    ctx.strokeRect(bx, by, bw, bh);
                    ctx.beginPath();
                    ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + bw - 5, by + bh - 5);
                    ctx.moveTo(bx + bw - 5, by + 5); ctx.lineTo(bx + 5, by + bh - 5);
                    ctx.stroke();
                    ctx.strokeStyle = NEON_M;
                    ctx.lineWidth   = 1.5;
                    break;
                }
                case 'tall': {
                    const bx = o.x, by = GY - 60, bw = 40, bh = 60;
                    ctx.fillStyle = NEON_D;
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.fillStyle   = NEON;
                    ctx.strokeStyle = NEON;
                    ctx.lineWidth   = 2;
                    ctx.strokeRect(bx, by, bw, bh);
                    // three horizontal lines
                    for (let yi = 1; yi <= 2; yi++) {
                        const ly = by + (bh / 3) * yi;
                        ctx.beginPath(); ctx.moveTo(bx + 4, ly); ctx.lineTo(bx + bw - 4, ly); ctx.stroke();
                    }
                    ctx.strokeStyle = NEON_M;
                    ctx.lineWidth   = 1.5;
                    break;
                }
            }
        }
        ctx.shadowBlur = 0;
    }

    function updateAndDrawParticles() {
        for (const p of particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle   = NEON;
            ctx.shadowColor = NEON;
            ctx.shadowBlur  = 5;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;
    }

    function drawPlayer() {
        const cx = player.x + PS / 2;
        const cy = player.y + PS / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(player.rot);

        ctx.shadowColor = NEON;
        ctx.shadowBlur  = 16;

        // body fill
        ctx.fillStyle = NEON_D;
        ctx.fillRect(-PS / 2, -PS / 2, PS, PS);

        // outer border
        ctx.strokeStyle = NEON;
        ctx.lineWidth   = 2.5;
        ctx.strokeRect(-PS / 2, -PS / 2, PS, PS);

        // inner square
        ctx.strokeStyle = NEON_M;
        ctx.lineWidth   = 1.5;
        ctx.strokeRect(-PS / 4, -PS / 4, PS / 2, PS / 2);

        // centre dot
        ctx.fillStyle = NEON;
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    function drawHUD() {
        ctx.fillStyle   = NEON;
        ctx.shadowColor = NEON;
        ctx.shadowBlur  = 5;
        ctx.font        = 'bold 12px system-ui';
        ctx.textAlign   = 'left';
        ctx.fillText('score: ' + Math.floor(score), 8, 16);
        ctx.shadowBlur  = 0;
        ctx.textAlign   = 'left';
    }

    function drawGame() {
        drawBg();
        drawObstacles();
        updateAndDrawParticles();
        drawGround();
        drawPlayer();
        drawHUD();
    }

    // ── Start ──
    startGame();
    </script>
</body>
</html>
