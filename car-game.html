<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Dodge Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            color: white;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        #hud {
            display: flex;
            gap: 40px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        #score-display { color: #ffff00; }
        #lives-display { color: #ff4444; }

        canvas {
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff44;
            display: block;
        }

        #overlay {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #overlay h2 {
            font-size: 2.5rem;
            color: #ff4444;
            text-shadow: 0 0 12px #ff4444;
        }

        #overlay p {
            font-size: 1.1rem;
            color: #ccc;
        }

        #start-btn {
            padding: 12px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffff, #6a11cb);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.15s;
        }

        #start-btn:hover { transform: scale(1.07); }

        #back-link {
            margin-top: 14px;
            color: #00ffff;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.8;
        }

        #back-link:hover { opacity: 1; text-decoration: underline; }

        #controls {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🚗 Car Dodge</h1>
    <div id="hud">
        <span id="score-display">Score: 0</span>
        <span id="lives-display">Lives: ❤️❤️❤️</span>
    </div>

    <div style="position:relative;">
        <canvas id="gameCanvas" width="360" height="560"></canvas>
        <div id="overlay">
            <h2 id="overlay-title">Car Dodge</h2>
            <p id="overlay-msg">Dodge the oncoming cars!</p>
            <button id="start-btn">▶ Start Game</button>
        </div>
    </div>

    <p id="controls">⬅ ➡ Arrow Keys or A / D to move</p>
    <a href="index.html" id="back-link">← Back to Home</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMsg = document.getElementById('overlay-msg');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');

        const ROAD_LEFT = 40;
        const ROAD_WIDTH = 280;
        const LANE_COUNT = 3;
        const LANE_W = ROAD_WIDTH / LANE_COUNT;

        let score, lives, speed, enemies, dashOffset, animId, running, playerX, playerY, invincible, invTimer;

        const playerW = 36, playerH = 60;
        const enemyW = 36, enemyH = 60;
        const enemyColors = ['#ff4444','#ff9900','#ff44ff','#44ffff','#ffffff'];

        function laneX(lane) {
            return ROAD_LEFT + lane * LANE_W + (LANE_W - playerW) / 2;
        }

        let currentLane = 1;
        let keys = {};

        document.addEventListener('keydown', e => {
            if (!running) return;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentLane > 0) {
                currentLane--;
                playerX = laneX(currentLane);
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && currentLane < LANE_COUNT - 1) {
                currentLane++;
                playerX = laneX(currentLane);
            }
        });

        function startGame() {
            score = 0;
            lives = 3;
            speed = 4;
            enemies = [];
            dashOffset = 0;
            running = true;
            invincible = false;
            invTimer = 0;
            currentLane = 1;
            playerX = laneX(currentLane);
            playerY = canvas.height - playerH - 20;
            overlay.style.display = 'none';
            cancelAnimationFrame(animId);
            lastEnemySpawn = 0;
            loop();
        }

        let lastEnemySpawn = 0;

        function spawnEnemy() {
            const lane = Math.floor(Math.random() * LANE_COUNT);
            const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];
            enemies.push({ x: laneX(lane), y: -enemyH, color });
        }

        function drawRoad() {
            // Road background
            ctx.fillStyle = '#333';
            ctx.fillRect(ROAD_LEFT, 0, ROAD_WIDTH, canvas.height);

            // Road edges
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(ROAD_LEFT, 0);
            ctx.lineTo(ROAD_LEFT, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(ROAD_LEFT + ROAD_WIDTH, 0);
            ctx.lineTo(ROAD_LEFT + ROAD_WIDTH, canvas.height);
            ctx.stroke();

            // Lane dashes
            ctx.setLineDash([30, 20]);
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            dashOffset = (dashOffset + speed) % 50;
            for (let i = 1; i < LANE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(ROAD_LEFT + i * LANE_W, -dashOffset);
                ctx.lineTo(ROAD_LEFT + i * LANE_W, canvas.height - dashOffset + 50);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function drawCar(x, y, w, h, color, isPlayer) {
            // Body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y + h * 0.15, w, h * 0.7, 6);
            ctx.fill();

            // Roof
            ctx.fillStyle = isPlayer ? '#003366' : '#440000';
            ctx.beginPath();
            ctx.roundRect(x + w * 0.15, y + h * 0.25, w * 0.7, h * 0.35, 5);
            ctx.fill();

            // Wheels
            ctx.fillStyle = '#111';
            ctx.fillRect(x - 4, y + h * 0.2, 8, 14);
            ctx.fillRect(x + w - 4, y + h * 0.2, 8, 14);
            ctx.fillRect(x - 4, y + h * 0.65, 8, 14);
            ctx.fillRect(x + w - 4, y + h * 0.65, 8, 14);

            // Headlights / tail lights
            if (isPlayer) {
                ctx.fillStyle = '#ffff99';
                ctx.fillRect(x + 4, y + h * 0.15, 8, 5);
                ctx.fillRect(x + w - 12, y + h * 0.15, 8, 5);
            } else {
                ctx.fillStyle = '#ff2200';
                ctx.fillRect(x + 4, y + h * 0.85, 8, 5);
                ctx.fillRect(x + w - 12, y + h * 0.85, 8, 5);
            }
        }

        function updateHUD() {
            scoreDisplay.textContent = `Score: ${score}`;
            const hearts = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
            livesDisplay.textContent = `Lives: ${hearts}`;
        }

        function checkCollision(e) {
            return (
                playerX < e.x + enemyW &&
                playerX + playerW > e.x &&
                playerY < e.y + enemyH &&
                playerY + playerH > e.y
            );
        }

        let frame = 0;

        function loop() {
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grass
            ctx.fillStyle = '#1a5c1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawRoad();

            // Spawn enemies
            lastEnemySpawn++;
            const spawnRate = Math.max(40, 90 - Math.floor(score / 10));
            if (lastEnemySpawn >= spawnRate) {
                spawnEnemy();
                lastEnemySpawn = 0;
            }

            // Move & draw enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += speed;
                drawCar(enemies[i].x, enemies[i].y, enemyW, enemyH, enemies[i].color, false);

                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    if (score % 15 === 0) speed += 0.5;
                    continue;
                }

                if (!invincible && checkCollision(enemies[i])) {
                    enemies.splice(i, 1);
                    lives--;
                    invincible = true;
                    invTimer = 120;
                    if (lives <= 0) {
                        running = false;
                        updateHUD();
                        overlayTitle.textContent = 'Game Over';
                        overlayMsg.textContent = `You scored ${score} points!`;
                        startBtn.textContent = '🔄 Play Again';
                        overlay.style.display = 'flex';
                        return;
                    }
                }
            }

            // Invincibility flash
            if (invincible) {
                invTimer--;
                if (invTimer <= 0) invincible = false;
            }

            // Draw player (flashing when invincible)
            if (!invincible || frame % 8 < 4) {
                drawCar(playerX, playerY, playerW, playerH, '#00aaff', true);
            }

            score += 0;
            updateHUD();

            animId = requestAnimationFrame(loop);
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
