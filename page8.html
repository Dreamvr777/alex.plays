<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m3gtse92 - Page 8</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0020, #b300ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 20px;
        }

        .page-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .container {
            width: 520px;
            max-width: 100%;
            background-color: #000;
            padding: 30px 24px;
            border-radius: 10px;
            border: 3px solid #333;
            font-style: italic;
            font-weight: bold;
            text-align: center;
            color: #fff;
        }

        .page-label {
            color: #b300ff;
            text-shadow: 0 0 8px #b300ff;
            font-size: 0.9rem;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container h1 {
            color: #b300ff;
            text-shadow: 0 0 14px #b300ff;
            font-size: 1.9rem;
            margin-bottom: 10px;
        }

        .container p {
            color: #e8b3ff;
            text-shadow: 0 0 8px #b300ff44;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Search bar */
        .search-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        #song-input {
            flex: 1;
            padding: 13px 16px;
            background: #0a0015;
            color: #b300ff;
            border: 2px solid #4d0066;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            font-style: italic;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: #b300ff;
        }

        #song-input::placeholder {
            color: #3d0052;
            font-style: italic;
        }

        #song-input:focus {
            border-color: #b300ff;
            box-shadow: 0 0 14px rgba(179, 0, 255, 0.35);
        }

        .search-btn {
            padding: 13px 18px;
            background: linear-gradient(135deg, #0d0020, #b300ff);
            color: #b300ff;
            border: 2px solid #b300ff;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(179, 0, 255, 0.55);
        }

        /* Redirect notice */
        #notice {
            margin-top: 18px;
            font-size: 1rem;
            color: #b300ff;
            text-shadow: 0 0 8px #b300ff;
            display: none;
            line-height: 1.6;
        }

        /* Nav arrows */
        .nav-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #0d0020, #b300ff);
            border: 2px solid #b300ff;
            border-radius: 50%;
            color: #b300ff;
            font-size: 28px;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }

        .nav-arrow:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(179, 0, 255, 0.6);
        }

        /* Note bar equaliser animation */
        .eq {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 30px;
            margin-bottom: 16px;
        }

        .eq span {
            display: inline-block;
            width: 5px;
            background: #b300ff;
            border-radius: 2px;
            box-shadow: 0 0 6px #b300ff;
            animation: eq-bar 0.8s ease-in-out infinite alternate;
        }

        .eq span:nth-child(1) { height: 40%; animation-duration: 0.6s; }
        .eq span:nth-child(2) { height: 70%; animation-duration: 0.9s; }
        .eq span:nth-child(3) { height: 100%; animation-duration: 0.5s; }
        .eq span:nth-child(4) { height: 60%; animation-duration: 0.75s; }
        .eq span:nth-child(5) { height: 85%; animation-duration: 0.65s; }
        .eq span:nth-child(6) { height: 45%; animation-duration: 1.0s; }
        .eq span:nth-child(7) { height: 75%; animation-duration: 0.55s; }

        @keyframes eq-bar {
            from { transform: scaleY(0.3); opacity: 0.5; }
            to   { transform: scaleY(1);   opacity: 1;   }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="page7.html" class="nav-arrow" title="Previous Page">&#8249;</a>
        <div class="container">
            <p class="page-label">Page 8</p>

            <!-- Equaliser animation -->
            <div class="eq">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>

            <h1>🎵 search ur fav song</h1>
            <p>type the song name (and artist if u want)<br>and i'll take u straight to it on youtube 🎧</p>

            <div class="search-row">
                <input
                    id="song-input"
                    type="text"
                    placeholder="e.g. travis scott antidote..."
                    autocomplete="off"
                />
                <button class="search-btn" onclick="searchSong()">🔍</button>
            </div>

            <div id="notice">🎵 taking u there now...</div>
        </div>
        <a href="page9.html" class="nav-arrow" title="Next Page">&#8250;</a>
    </div>

    <script>
        document.getElementById('song-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchSong();
        });

        function searchSong() {
            const raw = document.getElementById('song-input').value.trim();
            if (!raw) return;

            // Show redirect notice
            const notice = document.getElementById('notice');
            notice.style.display = 'block';
            notice.textContent = '🎵 taking u to "' + raw + '"...';

            // Redirect to YouTube search after a brief moment
            setTimeout(() => {
                const query = encodeURIComponent(raw + ' official');
                window.location.href = 'https://www.youtube.com/results?search_query=' + query;
            }, 800);
        }
    </script>
</body>
</html>
