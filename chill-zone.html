<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill Zone 🛋️</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0d0d1a 0%, #1a0a2e 60%, #2a1a0e 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ---- ROOM ---- */
        .room {
            width: 100%;
            max-width: 700px;
            position: relative;
            margin-top: 30px;
            padding: 0 20px;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; }
            to   { opacity: 1; }
        }

        /* Window */
        .window-view {
            position: relative;
            z-index: 1;
            width: 180px;
            height: 110px;
            margin: 0 auto 10px auto;
            border: 6px solid #5a3e28;
            border-radius: 4px;
            background: linear-gradient(180deg, #0a0a20 0%, #1a1040 100%);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(100,80,255,0.3), inset 0 0 20px rgba(0,0,50,0.5);
        }
        .window-moon {
            position: absolute;
            top: 12px; right: 20px;
            width: 28px; height: 28px;
            background: #fffbe0;
            border-radius: 50%;
            box-shadow: 0 0 14px 4px #fffbe0aa;
        }
        .window-frame-h {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 4px;
            background: #5a3e28;
            transform: translateY(-50%);
        }
        .window-frame-v {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px;
            background: #5a3e28;
            transform: translateX(-50%);
        }

        /* Floor lamp */
        .lamp {
            position: absolute;
            right: 20px;
            bottom: 0;
            z-index: 2;
        }
        .lamp-shade {
            width: 36px; height: 22px;
            background: linear-gradient(135deg, #c8860a, #ffcc44);
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            box-shadow: 0 0 30px 10px rgba(255,200,50,0.35);
            margin: 0 auto;
        }
        .lamp-pole {
            width: 4px; height: 80px;
            background: #888;
            margin: 0 auto;
        }
        .lamp-base {
            width: 24px; height: 8px;
            background: #666;
            border-radius: 4px;
            margin: 0 auto;
        }

        /* Couch */
        .couch-wrap {
            position: relative;
            z-index: 3;
            margin-top: -10px;
        }
        .couch {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            position: relative;
        }
        .couch-arm {
            width: 28px;
            height: 54px;
            background: linear-gradient(180deg, #7b3f1e, #5a2d0c);
            border-radius: 6px 6px 0 0;
            flex-shrink: 0;
        }
        .couch-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 280px;
        }
        .couch-back {
            width: 100%;
            height: 50px;
            background: linear-gradient(180deg, #8b4513, #6b340f);
            border-radius: 8px 8px 0 0;
        }
        .couch-seats {
            display: flex;
            width: 100%;
            gap: 3px;
        }
        .couch-seat {
            flex: 1;
            height: 34px;
            background: linear-gradient(180deg, #a0522d, #7b3f1e);
            border-radius: 0 0 4px 4px;
        }
        .couch-base {
            width: 100%;
            height: 10px;
            background: #3d1a07;
            border-radius: 0 0 4px 4px;
        }
        /* Little person on couch */
        .person {
            position: absolute;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 4;
        }
        .person-head {
            width: 18px; height: 18px;
            background: #f5c89a;
            border-radius: 50%;
        }
        .person-body {
            width: 22px; height: 20px;
            background: #4a90d9;
            border-radius: 4px 4px 0 0;
            margin-top: 1px;
        }
        .person-legs {
            display: flex; gap: 2px;
        }
        .person-leg {
            width: 8px; height: 14px;
            background: #2c2c2c;
            border-radius: 0 0 4px 4px;
        }

        /* Floor */
        .floor {
            width: 100%;
            height: 14px;
            background: linear-gradient(180deg, #2e1a0e, #1a0e07);
            border-radius: 0 0 6px 6px;
            z-index: 2;
            position: relative;
        }

        /* Rug */
        .rug {
            width: 260px;
            height: 10px;
            background: repeating-linear-gradient(90deg, #6b0f1a 0px, #6b0f1a 10px, #9b1a2a 10px, #9b1a2a 20px);
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ---- CHAT ---- */
        .chat-section {
            width: 100%;
            max-width: 660px;
            margin: 24px 20px 20px 20px;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        .chat-title {
            text-align: center;
            color: #ffcc88;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            text-shadow: 0 0 10px rgba(255,180,80,0.5);
        }

        .chat-box {
            background: rgba(10,5,20,0.85);
            border: 2px solid #3d2a5e;
            border-radius: 14px;
            padding: 16px;
            height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 0 20px rgba(80,40,140,0.4);
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #3d2a5e; border-radius: 10px; }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #220033, #6a0dad);
            color: #f0c8ff;
            border-bottom-right-radius: 4px;
        }
        .msg.ai {
            align-self: flex-start;
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            color: #c8e6ff;
            border-bottom-left-radius: 4px;
            border: 1px solid #3a3a5e;
        }
        .msg.ai .ai-label {
            font-size: 0.72rem;
            color: #8899ff;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #8899ff;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); }
            30%          { transform: translateY(-6px); }
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(10,5,20,0.85);
            border: 2px solid #3d2a5e;
            border-radius: 30px;
            color: #e8d8ff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .chat-input::placeholder { color: #665577; }
        .chat-input:focus { border-color: #8844cc; }

        .send-btn {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #220033, #8844cc);
            border: 2px solid #8844cc;
            border-radius: 50%;
            color: #e0b0ff;
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 16px rgba(136,68,204,0.6);
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .back-link {
            display: inline-block;
            margin: 6px 0 28px 0;
            color: #9966cc;
            font-size: 0.85rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s;
            position: relative;
            z-index: 10;
        }
        .back-link:hover { color: #cc88ff; }
    </style>
</head>
<body>

    <!-- Twinkling stars (generated by JS) -->
    <div class="stars" id="stars"></div>

    <!-- Room scene -->
    <div class="room">
        <div class="window-view">
            <div class="window-moon"></div>
            <div class="window-frame-h"></div>
            <div class="window-frame-v"></div>
        </div>

        <div style="position:relative;">
            <div class="lamp">
                <div class="lamp-shade"></div>
                <div class="lamp-pole"></div>
                <div class="lamp-base"></div>
            </div>

            <div class="couch-wrap">
                <div class="couch">
                    <div class="couch-arm"></div>
                    <div class="couch-body">
                        <div class="couch-back"></div>
                        <div class="couch-seats">
                            <div class="couch-seat"></div>
                            <div class="couch-seat"></div>
                            <div class="couch-seat"></div>
                        </div>
                        <div class="couch-base"></div>
                    </div>
                    <div class="couch-arm"></div>
                </div>
                <div class="person">
                    <div class="person-head"></div>
                    <div class="person-body"></div>
                    <div class="person-legs">
                        <div class="person-leg"></div>
                        <div class="person-leg"></div>
                    </div>
                </div>
            </div>

            <div class="floor"></div>
            <div class="rug"></div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-section">
        <p class="chat-title">✨ chill & chat ✨</p>
        <div class="chat-box" id="chatBox">
            <div class="msg ai">
                <div class="ai-label">🤖 AI</div>
                hey, welcome to the chill zone 🛋️ kick back and talk to me about anything
            </div>
        </div>
        <div class="chat-input-row">
            <input
                type="text"
                class="chat-input"
                id="chatInput"
                placeholder="say something..."
                maxlength="500"
                autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" title="Send">➤</button>
        </div>
    </div>

    <a href="page4.html" class="back-link">← back to page 4</a>

    <script>
        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            s.style.cssText = `
                width:${size}px; height:${size}px;
                top:${Math.random() * 60}%;
                left:${Math.random() * 100}%;
                animation-delay:${Math.random() * 3}s;
                animation-duration:${2 + Math.random() * 3}s;
            `;
            starsEl.appendChild(s);
        }

        // Chat logic
        const chatBox   = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const sendBtn   = document.getElementById('sendBtn');

        function scrollDown() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addMsg(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            if (role === 'ai') {
                div.innerHTML = `<div class="ai-label">🤖 AI</div>${escapeHtml(text)}`;
            } else {
                div.textContent = text;
            }
            chatBox.appendChild(div);
            scrollDown();
            return div;
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `<div class="ai-label">🤖 AI</div><span class="typing-dots"><span></span><span></span><span></span></span>`;
            chatBox.appendChild(div);
            scrollDown();
            return div;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            sendBtn.disabled = true;
            chatInput.disabled = true;

            addMsg(text, 'user');
            const typingEl = addTyping();

            try {
                const response = await puter.ai.chat(text, {
                    model: 'gpt-4o-mini'
                });
                const reply = response?.message?.content?.[0]?.text
                           ?? response?.message?.content
                           ?? response?.toString()
                           ?? "hmm, couldn't get a reply 🤔";
                typingEl.innerHTML = `<div class="ai-label">🤖 AI</div>${escapeHtml(reply)}`;
            } catch (e) {
                typingEl.innerHTML = `<div class="ai-label">🤖 AI</div>oops, something went wrong 😬 try again?`;
            }

            scrollDown();
            sendBtn.disabled = false;
            chatInput.disabled = false;
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
